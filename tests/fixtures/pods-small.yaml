apiVersion: v1
kind: Pod
metadata:
  name: pod-affinity-gpu
  namespace: default
spec:
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
        - matchExpressions:
          - key: gpu
            operator: In
            values:
            - "true"
  containers:
  - name: app
    image: busybox
    resources:
      requests:
        cpu: "1"
        memory: "2048Mi"
---
