# Shared configuration for the kwokctl shim.
# Rules are matched in order; first match wins.
# Format: <arg-substring>:<stdout>|<exit-code>
SHIM_RULES=(
  "get clusters:"
  "create cluster --name tracer:"
  "create cluster --name kwok:kindest/node:v1.29.0|0"
  "delete cluster --name tracer:"
  "delete cluster --name kwok:"
)
DEFAULT_EXIT_CODE=0
