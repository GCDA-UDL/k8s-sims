apiVersion: v1
kind: Pod
metadata:
  name: pod-1

spec:
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: node-role.kubernetes.io/node
                operator: In
                values:
                  - kubemark-node
  containers:
    - command:
        - sleep
        - "3600"
      image: busybox
      imagePullPolicy: IfNotPresent
      name: busybox
      resources:
        limits:
          cpu: 1
          memory: 200Mi
        requests:
          cpu: 10m
          memory: 100Mi
  restartPolicy: Always
---
