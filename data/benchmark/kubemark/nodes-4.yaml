apiVersion: v1
kind: Pod
metadata:
  labels:
    name: node-1
  name: node-1
  namespace: kubemark
spec:
  containers:
  - command:
    - /kubemark
    - --morph=kubelet
    - --name=$(NODE_NAME)
    - --kubeconfig=/kubeconfig/kubelet.kubeconfig
    - --v=5
    - --node-labels=node-role.kubernetes.io/node=kubemark-node,beta.kubernetes.io/os=linux,kubernetes.io/hostname=node-1,kubernetes.io/os=linux
    - --extended-resources=cpu=1000m,memory=81920Mi,pods=1001
    env:
    - name: NODE_NAME
      valueFrom:
        fieldRef:
          fieldPath: metadata.name
    image: thesmuks/kubemark:v1.29.0
    imagePullPolicy: IfNotPresent
    name: hollow-kubelet
    ports:
    - containerPort: 4194
    - containerPort: 10250
    - containerPort: 10255
    resources:
      requests:
        cpu: 10m
        memory: 20M
    securityContext:
      privileged: true
    volumeMounts:
    - mountPath: /kubeconfig
      name: kubeconfig-volume
      readOnly: true
    - mountPath: /var/log
      name: logs-volume
    - mountPath: /run/containerd
      name: containerd
  - command:
    - /kubemark
    - --morph=proxy
    - --name=$(NODE_NAME)
    - --kubeconfig=/kubeconfig/kubeproxy.kubeconfig
    - --v=5
    env:
    - name: NODE_NAME
      valueFrom:
        fieldRef:
          fieldPath: metadata.name
    image: thesmuks/kubemark:v1.29.0
    imagePullPolicy: IfNotPresent
    name: hollow-proxy
    resources:
      requests:
        cpu: 10m
        memory: 20M
    securityContext:
      privileged: true
    volumeMounts:
    - mountPath: /kubeconfig
      name: kubeconfig-volume
      readOnly: true
    - mountPath: /var/log
      name: logs-volume
  tolerations:
  - effect: NoExecute
    key: node.kubernetes.io/unreachable
    operator: Exists
    tolerationSeconds: 900
  volumes:
  - name: kubeconfig-volume
    secret:
      secretName: kubeconfig
  - hostPath:
      path: /var/log
    name: logs-volume
  - hostPath:
      path: /run/containerd
    name: containerd
  - emptyDir: {}
    name: no-serviceaccount-access-to-real-master
